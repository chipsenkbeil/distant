name: CI

on:
  push:
    paths-ignore:
      - '**.md'
      - 'docs/**'
    branches:
      - master
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
    branches:
      - master

jobs:
  clippy:
    name: "Lint with clippy (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest }
          - { os: ubuntu-latest }
    env:
      RUSTFLAGS: -Dwarnings --cfg ci
    steps:
      - name: Ensure windows git checkout keeps \n line ending
        run: |
          git config --system core.autocrlf false
          git config --system core.eol lf
        if: matrix.os == 'windows-latest'
      - uses: actions/checkout@v4
      - name: Install Rust (clippy)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: "ci-clippy-${{ matrix.os }}"
      - name: Check Cargo availability
        run: cargo --version
      - name: Run clippy (all features)
        run: cargo clippy --workspace --all-targets --verbose --all-features
  rustfmt:
    name: "Verify code formatting (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest }
          - { os: ubuntu-latest }
    steps:
      - name: Ensure windows git checkout keeps \n line ending
        run: |
          git config --system core.autocrlf false
          git config --system core.eol lf
        if: matrix.os == 'windows-latest'
      - uses: actions/checkout@v4
      - name: Install Rust (rustfmt)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          key: "ci-rustfmt-${{ matrix.os }}"
      - name: Check Cargo availability
        run: cargo --version
      - run: cargo fmt --all -- --check
  tests:
    name: "Test Rust ${{ matrix.rust }} on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: --cfg ci
      RUST_LOG: trace
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rust: stable, os: windows-latest, target: x86_64-pc-windows-msvc }
          - { rust: stable, os: macos-latest }
          - { rust: stable, os: ubuntu-latest }
          - { rust: 1.88.0, os: ubuntu-latest }
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          targets: ${{ matrix.target }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9
      - uses: Swatinem/rust-cache@v2
        with:
          key: "ci-tests-${{ matrix.os }}-${{ matrix.rust }}-${{ matrix.target }}"
      - name: Check Cargo availability
        run: cargo --version
      - name: Windows SSH diagnostics
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Write-Host "=== OpenSSH version ==="
          & sshd -V 2>&1 | Out-Host
          Write-Host "=== SSH-related processes ==="
          Get-Process | Where-Object { $_.Name -like '*ssh*' } | Format-Table -AutoSize
          Write-Host "=== Listening ports (count) ==="
          netstat -an | Select-String "LISTEN" | Measure-Object | Select-Object -ExpandProperty Count
          Write-Host "=== Windows version ==="
          [System.Environment]::OSVersion | Format-List
          Write-Host "=== System memory ==="
          Get-CimInstance Win32_OperatingSystem | Select-Object TotalVisibleMemorySize,FreePhysicalMemory | Format-List
      - name: Configure Windows for SSH testing
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Windows Server 2025 has OpenSSH installed by default
          # We don't start the system sshd service as our tests spawn their own sshd instances

          # Stop the system sshd service — it ships running on the windows-latest
          # VM image and interferes with per-test sshd instances (the user-context
          # sshd -z subprocess hangs, producing no output on exec/sftp channels).
          Stop-Service sshd -ErrorAction SilentlyContinue
          Set-Service sshd -StartupType Disabled

          # Ensure ssh-agent is available for key management
          Set-Service ssh-agent -StartupType Automatic
          Start-Service ssh-agent

          # Configure firewall for SSH tests on high ports used by tests
          New-NetFirewallRule -Name sshd-tests -DisplayName 'OpenSSH Tests (sshd)' -Enabled True -Direction Inbound -Protocol TCP -Action Allow -LocalPort 49152-65535

          # Ensure we have proper permissions for file operations
          # Grant current user SeCreateSymbolicLinkPrivilege if needed for tests
      - name: Extend Windows retry count to be more resilient
        run: echo "NEXTEST_RETRIES=3" >> $GITHUB_ENV
        shell: bash
        if: matrix.os == 'windows-latest'
      - name: Set faster timeouts for Windows SSH debugging
        run: echo "NEXTEST_TEST_TIMEOUT=90s" >> $GITHUB_ENV
        shell: bash
        if: matrix.os == 'windows-latest'
      - name: Ensure /run/sshd exists on Unix
        run: sudo mkdir -p /run/sshd
        if: matrix.os == 'ubuntu-latest'
      - name: Pre-pull Docker test image
        run: docker pull ubuntu:22.04
        if: runner.os == 'Linux'
      - name: Run all workspace tests (all features)
        run: cargo nextest run --profile ci --release --all-features --workspace
      - name: Run all doc tests (all features)
        run: cargo test --release --all-features --workspace --doc

  freebsd:
    name: "Test on FreeBSD x86_64"
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: --cfg ci
    steps:
      - uses: actions/checkout@v4
      - name: Download cargo-nextest for FreeBSD
        run: |
          curl -LsSf https://get.nexte.st/latest/freebsd | tar xzf - -C .
          chmod +x ./cargo-nextest
      - name: Cache FreeBSD build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: freebsd-14.2-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            freebsd-14.2-target-
      - name: Test in FreeBSD VM
        uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: freebsd
          version: '14.2'
          environment_variables: RUSTFLAGS
          run: |
            sudo pkg install -y curl
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            . "$HOME/.cargo/env"
            mv ./cargo-nextest "$HOME/.cargo/bin/"
            sudo mkdir -p /var/run/sshd
            cargo nextest run --profile ci --all-features --workspace
            cargo test --all-features --workspace --doc
