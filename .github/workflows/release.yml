# Runner versions pinned for reproducible release builds. Review quarterly.
name: Release

on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
      - v[0-9]+.[0-9]+.[0-9]+-**
  workflow_dispatch:
    inputs:
      nightly:
        description: 'Build as nightly release'
        required: false
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false
jobs:
  validate:
    name: "Pre-release validation"
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    env:
      RUSTFLAGS: -Dwarnings --cfg ci
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy, rustfmt
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features
      - run: cargo nextest run --profile ci --all-features --workspace
      - run: cargo test --all-features --workspace --doc

  macos:
    name: "Build release on MacOS (${{ matrix.target }})"
    needs: [validate]
    if: always() && (needs.validate.result == 'success' || needs.validate.result == 'skipped')
    runs-on: macos-14
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - name: Stamp nightly version
        if: inputs.nightly == true
        shell: bash
        run: bash scripts/stamp-nightly.sh
      - name: Install Rust (${{ matrix.target }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build binary (${{ matrix.target }})
        run: |
          cargo build --release --all-features --target ${{ matrix.target }}
          mv ./target/${{ matrix.target }}/release/distant ./distant-${{ matrix.target }}
          chmod +x ./distant-${{ matrix.target }}
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ./distant-${{ matrix.target }}
          if-no-files-found: error
          retention-days: 5

  macos_unify:
    name: "Build universal binary on MacOS"
    needs: [macos]
    if: always() && needs.macos.result == 'success'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Unify binaries
        run: |
          lipo -create -output distant-universal-apple-darwin \
              ./x86_64-apple-darwin/distant-x86_64-apple-darwin \
              ./aarch64-apple-darwin/distant-aarch64-apple-darwin
          chmod +x ./distant-universal-apple-darwin
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: universal-apple-darwin
          path: ./distant-universal-apple-darwin
          if-no-files-found: error
          retention-days: 5

  windows:
    name: "Build release on Windows (${{ matrix.target }})"
    needs: [validate]
    if: always() && (needs.validate.result == 'success' || needs.validate.result == 'skipped')
    runs-on: windows-2025
    strategy:
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - name: Stamp nightly version
        if: inputs.nightly == true
        shell: bash
        run: bash scripts/stamp-nightly.sh
      - name: Install Rust (${{ matrix.target }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build binary (${{ matrix.target }})
        run: |
          cargo build --release --all-features --target ${{ matrix.target }}
          mv ./target/${{ matrix.target }}/release/distant.exe ./distant-${{ matrix.target }}.exe
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ./distant-${{ matrix.target }}.exe
          if-no-files-found: error
          retention-days: 5

  linux:
    name: "Build release on Linux (${{ matrix.target }})"
    needs: [validate]
    if: always() && (needs.validate.result == 'success' || needs.validate.result == 'skipped')
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            build: --all-features
          - target: aarch64-unknown-linux-gnu
            build: --all-features
            deps: gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
          - target: armv7-unknown-linux-gnueabihf
            build: --all-features
            deps: gcc-arm-linux-gnueabihf binutils-arm-linux-gnueabihf
          - target: x86_64-unknown-linux-musl
            build: --all-features
            deps: musl-tools
          - target: aarch64-unknown-linux-musl
            build: --all-features
            deps: musl-tools
          - target: aarch64-linux-android
            build: --no-default-features --features docker,host,ssh
    steps:
      - uses: actions/checkout@v4
      - name: Stamp nightly version
        if: inputs.nightly == true
        shell: bash
        run: bash scripts/stamp-nightly.sh
      - name: Install Rust (${{ matrix.target }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        if: ${{ matrix.deps }}
        run: |
          sudo apt update
          sudo apt install -y ${{ matrix.deps }}
      - name: Install aarch64 musl toolchain
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          curl -L --retry 3 https://github.com/cross-tools/musl-cross/releases/download/20250929/aarch64-unknown-linux-musl.tar.xz | tar xJ -C /opt
          echo "/opt/aarch64-unknown-linux-musl/bin" >> $GITHUB_PATH
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-unknown-linux-musl-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_musl=aarch64-unknown-linux-musl-gcc" >> $GITHUB_ENV
          echo "AR_aarch64_unknown_linux_musl=aarch64-unknown-linux-musl-ar" >> $GITHUB_ENV
      - name: Configure Android NDK
        if: matrix.target == 'aarch64-linux-android'
        run: |
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "CC_aarch64_linux_android=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar" >> $GITHUB_ENV
      - name: Build binary (${{ matrix.target }})
        run: |
          cargo build --release ${{ matrix.build }} --target ${{ matrix.target }}
          mv ./target/${{ matrix.target }}/release/distant ./distant-${{ matrix.target }}
          chmod +x ./distant-${{ matrix.target }}
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ./distant-${{ matrix.target }}
          if-no-files-found: error
          retention-days: 5

  bsd:
    name: "Build release on ${{ matrix.name }}"
    needs: [validate]
    if: always() && (needs.validate.result == 'success' || needs.validate.result == 'skipped')
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-freebsd
            name: FreeBSD x86_64
            os: freebsd
            version: '14.2'
            arch: x86-64
            pkg_cmd: sudo pkg install -y curl ca_root_nss gmake
            rust_setup: |
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              . "$HOME/.cargo/env"
            build_env: ''
          - target: aarch64-unknown-freebsd
            name: FreeBSD aarch64
            os: freebsd
            version: '14.2'
            arch: arm64
            pkg_cmd: sudo pkg install -y curl ca_root_nss gmake rust
            rust_setup: ''
            build_env: ''
          - target: x86_64-unknown-netbsd
            name: NetBSD x86_64
            os: netbsd
            version: '10.1'
            arch: x86-64
            pkg_cmd: sudo pkgin -y install curl gmake
            rust_setup: |
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              . "$HOME/.cargo/env"
            build_env: ''
          - target: aarch64-unknown-netbsd
            name: NetBSD aarch64
            os: netbsd
            version: '10.1'
            arch: arm64
            pkg_cmd: sudo pkgin -y install curl gmake rust
            rust_setup: ''
            build_env: ''
          - target: x86_64-unknown-openbsd
            name: OpenBSD x86_64
            os: openbsd
            version: '7.8'
            arch: x86-64
            pkg_cmd: sudo pkg_add curl gmake rust
            rust_setup: ''
            build_env: ''
          - target: aarch64-unknown-openbsd
            name: OpenBSD aarch64
            os: openbsd
            version: '7.8'
            arch: arm64
            pkg_cmd: sudo pkg_add curl gmake rust
            rust_setup: ''
            build_env: CARGO_PROFILE_RELEASE_LTO=thin
    steps:
      - uses: actions/checkout@v4
      - name: Stamp nightly version
        if: inputs.nightly == true
        shell: bash
        run: bash scripts/stamp-nightly.sh
      - name: Cache ${{ matrix.name }} build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: release-${{ matrix.target }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            release-${{ matrix.target }}-target-
      - name: Build in ${{ matrix.name }} VM
        uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: ${{ matrix.os }}
          version: ${{ matrix.version }}
          architecture: ${{ matrix.arch }}
          run: |
            ${{ matrix.pkg_cmd }}
            ${{ matrix.rust_setup }}
            ${{ matrix.build_env }} cargo build --release --all-features
            mv ./target/release/distant ./distant-${{ matrix.target }}
            chmod +x ./distant-${{ matrix.target }}
      - name: Trim target cache
        run: |
          # Remove workspace crate artifacts (these embed the version and must
          # be rebuilt each run anyway). Keep dependency crates which are the
          # expensive part to compile from scratch.
          #
          # The binary itself is already moved out of target/ by the build step,
          # so we only need the dependency artifacts for cache value.
          rm -rf target/release/build/distant-*
          rm -rf target/release/.fingerprint/distant-*
          rm -f  target/release/deps/distant*
          rm -f  target/release/deps/libdistant*
          rm -f  target/release/distant target/release/distant.d
          # Remove incremental compilation data (large, not useful for release)
          rm -rf target/release/incremental
          # Show resulting size
          du -sh target/ 2>/dev/null || true
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ./distant-${{ matrix.target }}
          if-no-files-found: error
          retention-days: 5

  publish:
    needs: [macos, macos_unify, windows, linux, bsd]
    if: >-
      always() &&
      needs.macos.result == 'success' &&
      needs.macos_unify.result == 'success' &&
      needs.windows.result == 'success' &&
      needs.linux.result == 'success' &&
      needs.bsd.result == 'success'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: read
    env:
      GIT_REF: ${{ github.ref }}
      IS_NIGHTLY: ${{ inputs.nightly }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docs/CHANGELOG.md
          sparse-checkout-cone-mode: false
      - uses: actions/download-artifact@v4
      - name: Generate SHA256 checksums
        run: |
          for i in $(find . -name "distant-*" -type f); do
            echo "Generating SHA256 checksum for ${i}"
            sha256sum "${i}" > "${i}.sha256"
          done
      - name: Generate BLAKE2 checksums
        run: |
          for i in $(find . -name "distant-*" -type f ! -name "*.sha256" ! -name "*.b2"); do
            echo "Generating BLAKE2 checksum for ${i}"
            b2sum "${i}" > "${i}.b2"
          done
      - name: Generate consolidated SHA256 checksums
        run: |
          find . -name "distant-*" -type f ! -name "*.sha256" ! -name "*.b2" | sort | while read f; do
            sha256sum "$f"
          done > SHA256SUMS
      - name: Generate consolidated BLAKE2 checksums
        run: |
          find . -name "distant-*" -type f ! -name "*.sha256" ! -name "*.b2" | sort | while read f; do
            b2sum "$f"
          done > B2SUMS
      - name: Determine git tag
        if: github.event_name == 'push'
        run: |
          echo "TAG_NAME=${GIT_REF#refs/tags/}" >> "$GITHUB_ENV"
          echo "TAG_VERSION=${GIT_REF#refs/tags/v}" >> "$GITHUB_ENV"
      - name: Check git tag for pre-release or nightly
        id: check-tag
        run: |
          if [[ "$IS_NIGHTLY" == "true" ]]; then
              echo "is_nightly=true" >> "$GITHUB_OUTPUT"
          elif [[ "$GIT_REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+-.*$ ]]; then
              echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Print release status
        run: |
          echo "Is pre-release: ${{ steps.check-tag.outputs.is_prerelease }}"
          echo "Is nightly: ${{ steps.check-tag.outputs.is_nightly }}"
      - name: Collect release assets
        id: assets
        run: |
          # find all binaries and their per-file checksum files (distant-*.sha256, distant-*.b2)
          ASSET_FILES=$(find . -name "distant-*" -type f | sort)
          COUNT=$(echo "$ASSET_FILES" | wc -l)
          echo "Found $COUNT asset files to upload"

          if [ -z "$ASSET_FILES" ]; then
            echo "::error::No distant-* files found — aborting"
            exit 1
          fi

          # Build a single-line, space-separated list of all asset files
          # (unquoted expansion + SC2086 disable lets bash word-split correctly)
          ASSET_LINE=$(echo "$ASSET_FILES" | tr '\n' ' ')
          echo "files=${ASSET_LINE}SHA256SUMS B2SUMS" >> "$GITHUB_OUTPUT"
      - name: Debug token permissions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== gh auth status ==="
          gh auth status
          echo "=== test releases API ==="
          gh api repos/${{ github.repository }}/releases --jq '.[0].tag_name' || echo "API call failed with exit $?"
      - name: Get Changelog Entry
        id: changelog
        uses: mindsers/changelog-reader-action@v2
        with:
          version: ${{ env.TAG_VERSION }}
          path: "./docs/CHANGELOG.md"
        if: ${{ steps.check-tag.outputs.is_nightly != 'true' }}
      - name: Publish (nightly)
        if: ${{ steps.check-tag.outputs.is_nightly == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Delete existing nightly release if present (preserve the tag)
          gh release delete nightly --yes --cleanup-tag=false 2>/dev/null || true

          # Create the nightly release — positional args are uploaded as assets
          # --notes provides the static disclaimer, --generate-notes appends
          # auto-generated PR/commit list showing what changed in this nightly
          # shellcheck disable=SC2086
          gh release create nightly \
            --title "Nightly Build" \
            --prerelease \
            --target "${{ github.sha }}" \
            --generate-notes \
            --notes "Nightly build from master (${{ github.sha }}).
          This is not guaranteed to pass all tests or even function properly." \
            ${{ steps.assets.outputs.files }}
      - name: Publish (release)
        if: ${{ steps.check-tag.outputs.is_nightly != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Build prerelease flag conditionally
          PRERELEASE_FLAG=""
          if [[ "${{ steps.check-tag.outputs.is_prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          # Write changelog to a temp file (safe for multiline content / special chars)
          cat > /tmp/release-notes.md <<'NOTES_EOF'
          ## Release Notes
          ${{ steps.changelog.outputs.changes }}
          NOTES_EOF

          # Create the tagged release with changelog + auto-generated PR notes
          # shellcheck disable=SC2086
          gh release create "$TAG_NAME" \
            --title "distant $TAG_NAME" \
            --target "${{ github.sha }}" \
            --generate-notes \
            $PRERELEASE_FLAG \
            --notes-file /tmp/release-notes.md \
            ${{ steps.assets.outputs.files }}
