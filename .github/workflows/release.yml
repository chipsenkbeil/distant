# Runner versions pinned for reproducible release builds. Review quarterly.
name: Release

on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
      - v[0-9]+.[0-9]+.[0-9]+-**
  workflow_dispatch:
    inputs:
      nightly:
        description: 'Build as nightly release'
        required: false
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Status of Targets:
#
# ✅ x86_64-apple-darwin
# ✅ aarch64-apple-darwin
#
# ✅ x86_64-pc-windows-msvc
# ✅ aarch64-pc-windows-msvc
#
# ✅ x86_64-unknown-linux-gnu
# ✅ aarch64-unknown-linux-gnu
# ❌ aarch64-linux-android (fails due to termios)
# ✅ armv7-unknown-linux-gnueabihf
#
# ✅ x86_64-unknown-linux-musl
# ✅ aarch64-unknown-linux-musl
#
# ✅ x86_64-unknown-freebsd
# ❓ aarch64-unknown-freebsd (works manually, but cannot cross-compile via CI)
#
# ❌ x86_64-unknown-netbsd (fails due to termios)
# ❌ aarch64-unknown-netbsd (???)
#
# ❌ x86_64-unknown-openbsd (fails due to rustc internal error at end)
# ❌ aarch64-unknown-openbsd (fails due to openssl-src)
#

jobs:
  validate:
    name: "Pre-release validation"
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    env:
      RUSTFLAGS: -Dwarnings --cfg ci
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy, rustfmt
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features
      - run: cargo nextest run --profile ci --all-features --workspace
      - run: cargo test --all-features --workspace --doc

  macos:
    name: "Build release on MacOS (${{ matrix.target }})"
    needs: [validate]
    if: always() && (needs.validate.result == 'success' || needs.validate.result == 'skipped')
    runs-on: macos-14
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - name: Stamp nightly version
        if: inputs.nightly == true
        shell: bash
        run: bash scripts/stamp-nightly.sh
      - name: Install Rust (${{ matrix.target }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build binary (${{ matrix.target }})
        run: |
          cargo build --release --all-features --target ${{ matrix.target }}
          mv ./target/${{ matrix.target }}/release/distant ./distant-${{ matrix.target }}
          chmod +x ./distant-${{ matrix.target }}
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ./distant-${{ matrix.target }}
          if-no-files-found: error
          retention-days: 5

  macos_unify:
    name: "Build universal binary on MacOS"
    needs: [macos]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Unify binaries
        run: |
          lipo -create -output distant-universal-apple-darwin \
              ./x86_64-apple-darwin/distant-x86_64-apple-darwin \
              ./aarch64-apple-darwin/distant-aarch64-apple-darwin
          chmod +x ./distant-universal-apple-darwin
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: universal-apple-darwin
          path: ./distant-universal-apple-darwin
          if-no-files-found: error
          retention-days: 5

  windows:
    name: "Build release on Windows (${{ matrix.target }})"
    needs: [validate]
    if: always() && (needs.validate.result == 'success' || needs.validate.result == 'skipped')
    runs-on: windows-2025
    strategy:
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - name: Stamp nightly version
        if: inputs.nightly == true
        shell: bash
        run: bash scripts/stamp-nightly.sh
      - name: Install Rust (${{ matrix.target }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build binary (${{ matrix.target }})
        run: |
          cargo build --release --all-features --target ${{ matrix.target }}
          mv ./target/${{ matrix.target }}/release/distant.exe ./distant-${{ matrix.target }}.exe
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ./distant-${{ matrix.target }}.exe
          if-no-files-found: error
          retention-days: 5

  linux:
    name: "Build release on Linux (${{ matrix.target }})"
    needs: [validate]
    if: always() && (needs.validate.result == 'success' || needs.validate.result == 'skipped')
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            build: --all-features
            cargo: cargo
          - target: aarch64-unknown-linux-gnu
            build: --all-features
            deps: gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
            cargo: cargo
          - target: armv7-unknown-linux-gnueabihf
            build: --all-features
            deps: gcc-arm-linux-gnueabihf binutils-arm-linux-gnueabihf
            cargo: cargo
          - target: x86_64-unknown-linux-musl
            build: --all-features
            deps: musl-tools
            cargo: cargo
          - target: aarch64-unknown-linux-musl
            build: --all-features
            deps: musl-tools gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
            cargo: cross
          - target: x86_64-unknown-freebsd
            build: --all-features
            cargo: cross
    steps:
      - uses: actions/checkout@v4
      - name: Stamp nightly version
        if: inputs.nightly == true
        shell: bash
        run: bash scripts/stamp-nightly.sh
      - name: Install Rust (${{ matrix.target }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        if: ${{ matrix.deps }}
        run: |
          sudo apt update
          sudo apt install -y ${{ matrix.deps }}
      - name: Install cross
        if: matrix.cargo == 'cross'
        uses: taiki-e/install-action@v2
        with:
          tool: cross@0.2.5
      - name: Build binary (${{ matrix.target }})
        run: |
          ${{ matrix.cargo }} build --release ${{ matrix.build }} --target ${{ matrix.target }}
          mv ./target/${{ matrix.target }}/release/distant ./distant-${{ matrix.target }}
          chmod +x ./distant-${{ matrix.target }}
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ./distant-${{ matrix.target }}
          if-no-files-found: error
          retention-days: 5

  publish:
    needs: [macos, macos_unify, windows, linux]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      GIT_REF: ${{ github.ref }}
      IS_NIGHTLY: ${{ inputs.nightly }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docs/CHANGELOG.md
          sparse-checkout-cone-mode: false
      - uses: actions/download-artifact@v4
      - name: Generate SHA256 checksums
        run: |
          for i in $(find . -name "distant-*" -type f); do
            echo "Generating checksum for ${i}"
            sha256sum "${i}" > "${i}.sha256sum"
          done
      - name: Generate consolidated checksums
        run: |
          find . -name "distant-*" -type f ! -name "*.sha256sum" | sort | while read f; do
            sha256sum "$f"
          done > SHA256SUMS
      - name: Determine git tag
        if: github.event_name == 'push'
        run: |
          echo "TAG_NAME=${GIT_REF#refs/tags/}" >> "$GITHUB_ENV"
          echo "TAG_VERSION=${GIT_REF#refs/tags/v}" >> "$GITHUB_ENV"
      - name: Check git tag for pre-release or nightly
        id: check-tag
        run: |
          if [[ "$IS_NIGHTLY" == "true" ]]; then
              echo "is_nightly=true" >> "$GITHUB_OUTPUT"
          elif [[ "$GIT_REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+-.*$ ]]; then
              echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Print release status
        run: |
          echo "Is pre-release: ${{ steps.check-tag.outputs.is_prerelease }}"
          echo "Is nightly: ${{ steps.check-tag.outputs.is_nightly }}"
      - name: Get Changelog Entry
        id: changelog
        uses: mindsers/changelog-reader-action@v2
        with:
          version: ${{ env.TAG_VERSION }}
          path: "./docs/CHANGELOG.md"
        if: ${{ steps.check-tag.outputs.is_nightly != 'true' }}
      - name: Publish (nightly)
        if: ${{ steps.check-tag.outputs.is_nightly == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          fail_on_unmatched_files: true
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: true
          files: |
            **/distant-*
            SHA256SUMS
          body: |
            Nightly build from master (${{ github.sha }}).
            This is not guaranteed to pass all tests or even function properly.
      - name: Publish (release)
        if: ${{ steps.check-tag.outputs.is_nightly != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          name: distant ${{ env.TAG_NAME }}
          fail_on_unmatched_files: true
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: ${{ steps.check-tag.outputs.is_prerelease == 'true' }}
          files: |
            **/distant-*
            SHA256SUMS
          body: |
            ## Release Notes
            ${{ steps.changelog.outputs.changes }}
