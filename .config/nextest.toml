[test-groups.ssh-integration]
max-threads = 4

[test-groups.ssh-integration-windows]
max-threads = 1

[test-groups.docker-integration]
max-threads = 2

[test-groups.tunnel-tests]
max-threads = 4

[test-groups.pty-tests]
max-threads = 4

[test-groups.mount-integration]
max-threads = 1

[profile.default]
fail-fast = false
leak-timeout = { period = "500ms", result = "fail" }
status-level = "fail"
final-status-level = "leak"
retries = { backoff = "exponential", count = 4, delay = "1s", max-delay = "16s", jitter = true }
slow-timeout = { period = "60s", terminate-after = 3 }

[[profile.default.overrides]]
filter = 'binary_id(distant-ssh::lib)'
platform = 'cfg(target_os = "windows")'
test-group = 'ssh-integration-windows'

[[profile.default.overrides]]
filter = 'binary_id(distant-ssh::lib)'
test-group = 'ssh-integration'

[[profile.default.overrides]]
filter = 'binary_id(distant-docker::lib)'
test-group = 'docker-integration'

[[profile.default.overrides]]
filter = 'test(tunnel_)'
test-group = 'tunnel-tests'

# SSH CLI tests spawn real sshd processes per test
[[profile.default.overrides]]
filter = 'test(ssh_) | test(connect_ssh) | test(launch_ssh)'
test-group = 'ssh-integration'

# Multi-backend tests with SSH cases also spawn sshd
[[profile.default.overrides]]
filter = 'test(_ssh)'
test-group = 'ssh-integration'

# PTY tests use portable-pty which needs careful concurrency
[[profile.default.overrides]]
filter = 'test(shell::) | test(spawn::)'
test-group = 'pty-tests'

# Mount tests: one at a time to prevent stale mounts
[[profile.default.overrides]]
filter = 'test(mount::)'
test-group = 'mount-integration'
